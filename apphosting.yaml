# Rama live: main (configurada en Firebase Console → App Hosting → Backend → Settings)

runConfig:
  concurrency: 10

env:
  - variable: WHATSAPP_VERIFY_TOKEN
    value: notificas_webhook_2026
    availability:
      - BUILD
      - RUNTIME
  # WhatsApp Cloud API: requerido para enviar mensajes (ask_choice, respuestas)
  - variable: WHATSAPP_PHONE_NUMBER_ID
    value: "693302653873170"
    availability:
      - RUNTIME
  # Token de Meta: crear con firebase apphosting:secrets:set whatsapp-access-token
  # y grant: firebase apphosting:secrets:grantaccess WHATSAPP_ACCESS_TOKEN --backend <nombre>
  - variable: WHATSAPP_ACCESS_TOKEN
    secret: whatsapp-access-token
    availability:
      - RUNTIME
  # HeartLink - reenvío de mensajes entrantes
  - variable: HEARTLINK_URL
    value: https://heartlink--heartlink-f4ftq.us-central1.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: INTERNAL_SECRET
    value: heartlink_internal_2026
    availability:
      - RUNTIME
  - variable: NOTIFICASHUB_URL
    secret: NOTIFICASHUB_URL
